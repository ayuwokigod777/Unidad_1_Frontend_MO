<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SportClub – Iniciar Sesión</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-box">

      <div class="auth-logo">
        <div class="auth-logo-mark">SC</div>
        <span class="auth-logo-name">SportClub</span>
      </div>

      <h2 class="auth-title">Iniciar sesión</h2>
      <p class="auth-subtitle">Ingresa tus datos para continuar</p>

      <div class="auth-form">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="ejemplo@correo.com" />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>

        <div style="display:flex;flex-direction:column;gap:8px;padding-top:4px;">
          <a href="dashboard-usuario.html" class="btn btn-primary" style="text-align:center;width:100%;">
            Ingresar como Usuario
          </a>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <a href="dashboard-coach.html" class="btn btn-outline" style="text-align:center;font-size:0.82rem;padding:9px 10px;">
              Ingresar como Entrenador
            </a>
            <a href="dashboard-admin.html" class="btn btn-outline" style="text-align:center;font-size:0.82rem;padding:9px 10px;">
              Ingresar como Administrador
            </a>
          </div>
        </div>

        <div class="auth-links">
          <a href="recuperar.html">¿Olvidaste tu contraseña? <span>Recupérala aquí</span></a>
          <a href="registro.html">¿No tienes cuenta? <span>Regístrate</span></a>
          <a href="index.html" style="font-size:0.78rem;color:#aaa;">← Volver al inicio</a>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
