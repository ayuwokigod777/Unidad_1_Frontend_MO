<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SportClub – Recuperar Contraseña</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-box">

      <div class="auth-logo">
        <div class="auth-logo-mark">SC</div>
        <span class="auth-logo-name">SportClub</span>
      </div>

      <h2 class="auth-title">Recuperar contraseña</h2>
      <p class="auth-subtitle">Te enviaremos un enlace a tu correo registrado para restablecer tu acceso.</p>

      <div class="auth-form">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="ejemplo@correo.com" />
        </div>

        <!-- mensaje de confirmacion que se muestra cuando hago click -->
        <div
          id="confirm"
          style="display:none;background:#f0fdf4;border:1.5px solid #86efac;border-radius:8px;padding:14px;font-size:0.85rem;color:#166534;text-align:center;"
        >
          ✅ Hemos enviado las instrucciones a tu correo. Revisa también tu carpeta de spam.
        </div>

        <button
          class="btn btn-primary"
          style="width:100%;text-align:center;"
          onclick="document.getElementById('confirm').style.display='block';this.textContent='✅ Correo enviado';this.style.opacity='0.6';this.disabled=true;"
        >
          Enviar instrucciones
        </button>

        <div class="auth-links">
          <a href="login.html">← Volver al inicio de sesión</a>
          <a href="registro.html">¿No tienes cuenta? <span>Regístrate</span></a>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
