<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SportClub – Iniciar Sesión</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-box">

      <div class="auth-logo">
        <div class="auth-logo-mark">SC</div>
        <span class="auth-logo-name">SportClub</span>
      </div>

      <h2 class="auth-title">Iniciar sesión</h2>
      <p class="auth-subtitle">Ingresa tus datos para continuar</p>

      <div class="auth-form">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="ejemplo@correo.com" />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>

        <!-- Mensaje de error -->
        <p id="error-msg" style="display:none;color:#dc2626;font-size:0.85rem;text-align:center;font-weight:600;">
          Credenciales incorrectas
        </p>

        <button class="btn btn-primary" style="width:100%;text-align:center;" onclick="handleLogin()">
          Ingresar
        </button>

        <div class="auth-links">
          <a href="recuperar.html">¿Olvidaste tu contraseña? <span>Recupérala aquí</span></a>
          <a href="registro.html">¿No tienes cuenta? <span>Regístrate</span></a>
          <a href="index.html" style="font-size:0.78rem;color:#aaa;">← Volver al inicio</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    async function handleLogin() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("error-msg");

      errorMsg.style.display = "none";

      try {
        const response = await fetch("http://localhost:3000/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email, password: password })
        });

        const data = await response.json();

        if (data.ok) {
          localStorage.setItem("token", data.data.token);
          localStorage.setItem("user", JSON.stringify(data.data.user));

          const role = data.data.user.role;

          if (role === "user")  window.location.href = "dashboard-usuario.html";
          if (role === "coach") window.location.href = "dashboard-coach.html";
          if (role === "admin") window.location.href = "dashboard-admin.html";

        } else {
          errorMsg.textContent = data.message || "Credenciales incorrectas";
          errorMsg.style.display = "block";
        }

      } catch (error) {
        errorMsg.textContent = "Error al conectar con el servidor";
        errorMsg.style.display = "block";
      }
    }
  </script>

</body>
</html>
