<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SportClub – Registro</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-box" style="max-width:460px;">

      <div class="auth-logo">
        <div class="auth-logo-mark">SC</div>
        <span class="auth-logo-name">SportClub</span>
      </div>

      <h2 class="auth-title">Crear cuenta</h2>
      <p class="auth-subtitle">Completa tus datos para registrarte</p>

      <div class="auth-form">
        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" placeholder="Tu nombre completo" />
          <span id="error-nombre" style="color:#dc2626;font-size:0.78rem;display:none;"></span>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="ejemplo@correo.com" />
          <span id="error-email" style="color:#dc2626;font-size:0.78rem;display:none;"></span>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Mínimo 8 caracteres" />
          <span id="error-password" style="color:#dc2626;font-size:0.78rem;display:none;"></span>
        </div>

        <div class="form-group">
          <label for="password2">Confirmar contraseña</label>
          <input type="password" id="password2" placeholder="Repite tu contraseña" />
          <span id="error-password2" style="color:#dc2626;font-size:0.78rem;display:none;"></span>
        </div>

        <details style="border:1.5px dashed var(--border);border-radius:8px;padding:14px 16px;">
          <summary style="font-size:0.83rem;font-weight:600;color:var(--gray);cursor:pointer;">
            + Información adicional (opcional)
          </summary>
          <div style="display:flex;flex-direction:column;gap:12px;margin-top:14px;">
            <div class="form-group">
              <label for="telefono">Teléfono</label>
              <input type="tel" id="telefono" placeholder="+56 9 1234 5678" />
            </div>
            <div class="form-group">
              <label for="deporte">Deporte de interés</label>
              <select id="deporte">
                <option value="">Selecciona una disciplina</option>
                <option>Crossfit</option>
                <option>Yoga</option>
                <option>Spinning</option>
                <option>Funcional</option>
                <option>Box Fitness</option>
                <option>Running</option>
              </select>
            </div>
          </div>
        </details>

        <p id="error-general" style="display:none;color:#dc2626;font-size:0.85rem;text-align:center;font-weight:600;"></p>
        <p id="success-msg" style="display:none;color:#166534;font-size:0.85rem;text-align:center;font-weight:600;">
          ✅ Cuenta creada exitosamente. Redirigiendo...
        </p>

        <button class="btn btn-primary" style="text-align:center;width:100%;" onclick="handleRegistro()">
          Crear mi cuenta
        </button>

        <div class="auth-links">
          <a href="login.html">¿Ya tienes cuenta? <span>Inicia sesión</span></a>
          <a href="index.html" style="font-size:0.78rem;color:#aaa;">← Volver al inicio</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    function mostrarError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = "block";
    }

    function limpiarErrores() {
      ["error-nombre","error-email","error-password","error-password2"].forEach(id => {
        document.getElementById(id).style.display = "none";
      });
      document.getElementById("error-general").style.display = "none";
      document.getElementById("success-msg").style.display = "none";
    }

    function validarFormulario(nombre, email, password, password2) {
      let valido = true;

      if (!nombre) {
        mostrarError("error-nombre", "El nombre es obligatorio");
        valido = false;
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        mostrarError("error-email", "Ingresa un correo válido");
        valido = false;
      }
      if (password.length < 8) {
        mostrarError("error-password", "La contraseña debe tener al menos 8 caracteres");
        valido = false;
      } else if (!/(?=.*[a-zA-Z])(?=.*[0-9])/.test(password)) {
        mostrarError("error-password", "La contraseña debe tener letras y números");
        valido = false;
      }
      if (password !== password2) {
        mostrarError("error-password2", "Las contraseñas no coinciden");
        valido = false;
      }

      return valido;
    }

    async function handleRegistro() {
      limpiarErrores();

      const nombre    = document.getElementById("nombre").value.trim();
      const email     = document.getElementById("email").value.trim();
      const password  = document.getElementById("password").value.trim();
      const password2 = document.getElementById("password2").value.trim();
      const deporte   = document.getElementById("deporte").value;

      if (!validarFormulario(nombre, email, password, password2)) return;

      try {
        const response = await fetch("http://localhost:3000/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            full_name: nombre,
            email: email,
            password: password,
            role: "user",
            must_change_password: false,
            metadata: { sports: deporte ? [{ name: deporte }] : [] }
          })
        });

        const data = await response.json();

        if (data.ok) {
          document.getElementById("success-msg").style.display = "block";
          setTimeout(() => { window.location.href = "login.html"; }, 2000);
        } else {
          const errorGeneral = document.getElementById("error-general");
          errorGeneral.textContent = data.message || "Error al registrar usuario";
          errorGeneral.style.display = "block";
        }

      } catch (error) {
        const errorGeneral = document.getElementById("error-general");
        errorGeneral.textContent = "Error al conectar con el servidor";
        errorGeneral.style.display = "block";
      }
    }
  </script>

</body>
</html>
